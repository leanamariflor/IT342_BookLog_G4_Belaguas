

spring.application.name=booklog_backend
spring.config.import=optional:file:.env[.properties],optional:file:./booklog-backend/.env[.properties]

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${ACCESS_TOKEN_EXPIRATION_MS}
app.jwt.refresh-expiration-ms=${REFRESH_ACCESS_TOKEN_EXPIRATION_MS}
app.security.admin-email=${APP_ADMIN_EMAIL:}
app.oauth2.authorized-redirect-uri=${OAUTH2_AUTHORIZED_REDIRECT_URI:http://localhost:5173/oauth2/redirect}
app.upload.dir=${APP_UPLOAD_DIR:uploads}

# Google Books API Key
google.books.api.key=${GOOGLE_BOOKS_API_KEY:}

# Google OAuth2 client configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

server.port=8080

# Supabase Configuration (Optional - for verification)
supabase.url=${SUPABASE_URL:}
supabase.key=${SUPABASE_KEY:}